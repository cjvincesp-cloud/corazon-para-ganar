<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Corazón para Ganar</title>
</head>
<body class="bg-[#052d62] text-white font-sans min-h-screen flex items-center justify-center p-4">
    <div class="max-w-md w-full bg-[#f1f1f1] rounded-3xl p-8 shadow-2xl text-[#052d62]">
        <header class="text-center mb-8">
            <h1 class="text-3xl font-black uppercase italic tracking-tighter leading-none text-[#052d62]">CORAZÓN PARA GANAR</h1>
            <p class="text-[10px] font-bold opacity-70 italic text-[#cbb155] tracking-widest uppercase mt-1">estatus oficial grone</p>
        </header>

        <div class="space-y-6">
            <input type="tel" id="celularInput" maxlength="9" placeholder="999888777" 
                class="w-full p-4 rounded-xl border-4 border-[#cbb155] text-2xl text-center font-bold bg-white focus:outline-none placeholder:text-gray-300">
            <button onclick="consultarEstatus()" class="w-full bg-[#052d62] text-[#cbb155] font-black py-5 rounded-xl text-lg shadow-lg hover:bg-black transition-all uppercase italic">
                CONSULTAR REGISTRO
            </button>
            
            <div id="resultado" class="hidden mt-6 p-6 rounded-2xl text-center font-bold border-2">
                </div>
        </div>
    </div>

    <script>
        async function consultarEstatus() {
            const celularUsuario = document.getElementById('celularInput').value.trim();
            const resultadoDiv = document.getElementById('resultado');
            const url = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSVSgHlway102guhsuSOkbVIZyBLybfeCAJpAEAUYf4gp3ir25Av8LHp41PSAIc81TuWHnSgIu7jXuv/pub?gid=666326084&single=true&output=csv';

            if (celularUsuario.length < 9) {
                alert("Ingresa los 9 dígitos de tu celular.");
                return;
            }

            resultadoDiv.innerHTML = "Buscando...";
            resultadoDiv.className = "mt-6 p-6 rounded-2xl text-center font-bold border-2 bg-gray-100 block text-[#052d62] animate-pulse";

            try {
                const response = await fetch(url);
                const data = await response.text();
                const filas = data.split('\n');
                let encontrado = false;

                // Buscamos de abajo hacia arriba para el registro válido más reciente
                for (let i = filas.length - 1; i >= 1; i--) {
                    const columnas = filas[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    const celularCSV = columnas[0] ? columnas[0].replace(/\D/g, '').trim() : "";
                    const estatusM = columnas[12] ? columnas[12].trim() : ""; // Col M

                    if (celularCSV === celularUsuario && estatusM !== "registro no válido") {
                        const nombre = columnas[3] ? columnas[3].replace(/['"]+/g, '').trim() : "HINCHA";
                        const codigoPG = columnas[21] ? columnas[21].replace(/['"]+/g, '').trim() : "---";
                        const fechaSorteo = columnas[9] ? columnas[9].replace(/['"]+/g, '').trim() : ""; // Col J
                        const productoGratuito = columnas[15] ? columnas[15].replace(/['"]+/g, '').trim() : ""; // Col P
                        const estatusGratuito = columnas[25] ? columnas[25].replace(/['"]+/g, '').trim() : "no hay registro ❌"; // Col Z
                        const estatusVIP = columnas[26] ? columnas[26].replace(/['"]+/g, '').trim() : "AL VIP, no estas participando"; // Col AA

                        resultadoDiv.innerHTML = `
                            <div class="text-2xl mb-5 border-b-2 border-gray-200 pb-2 uppercase font-black">${nombre}</div>
                            
                            <div class="mb-5">
                                <span class="text-[10px] block opacity-50 uppercase font-bold">TU CÓDIGO PG:</span>
                                <span class="text-4xl font-black text-[#052d62] bg-[#cbb155] px-6 py-1 rounded-lg shadow-sm italic">${codigoPG === "repetido +1 vez" ? "---" : codigoPG}</span>
                            </div>

                            <div class="mb-5 py-4 border-t border-gray-200">
                                <span class="text-[11px] block font-black text-[#cbb155] uppercase mb-1 tracking-wider">SORTEO GRATUITO 🎁</span>
                                <span class="text-xl block font-bold leading-tight">${estatusGratuito}</span>
                                <p class="text-sm mt-2 text-gray-600 font-medium">Producto: <span class="font-bold">${productoGratuito}</span></p>
                                <p class="text-xs opacity-70">Fecha: ${fechaSorteo}</p>
                            </div>

                            <div class="mb-0 py-4 border-t border-gray-200">
                                <span class="text-[11px] block font-black text-[#cbb155] uppercase mb-1 tracking-wider">VIP 🏆</span>
                                <span class="text-xl block font-black italic ${estatusVIP === 'Accedes 😎' ? 'text-blue-700' : 'text-gray-400'}">
                                    ${estatusVIP}
                                </span>
                            </div>
                        `;
                        resultadoDiv.className = "mt-6 p-6 rounded-2xl text-center font-bold border-4 border-[#cbb155] bg-white text-[#052d62] block shadow-xl";
                        encontrado = true;
                        break;
                    }
                }

                if (!encontrado) {
                    resultadoDiv.innerHTML = "No estas registrado";
                    resultadoDiv.className = "mt-6 p-6 rounded-2xl text-center font-bold border-2 border-red-500 bg-red-100 text-red-700 block";
                }
            } catch (error) {
                resultadoDiv.innerHTML = "ERROR DE CONEXIÓN";
                resultadoDiv.className = "mt-6 p-6 rounded-2xl text-center font-bold border-2 border-orange-500 bg-orange-100 text-orange-700 block";
            }
        }
    </script>
</body>
</html>
