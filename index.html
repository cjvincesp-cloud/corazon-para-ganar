<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Corazón para Ganar</title>
</head>
<body class="bg-[#052d62] text-white font-sans min-h-screen flex items-center justify-center p-4">
    <div class="max-w-md w-full bg-[#f1f1f1] rounded-3xl p-8 shadow-2xl text-[#052d62]">
        <header class="text-center mb-8">
            <h1 class="text-3xl font-black uppercase italic tracking-tighter leading-none">Corazón para Ganar</h1>
            <p class="text-[10px] font-bold opacity-70 italic text-[#cbb155] tracking-widest uppercase mt-1">Estatus Oficial GDR</p>
        </header>

        <div class="space-y-6">
            <input type="tel" id="celularInput" maxlength="9" placeholder="Ingresa tu celular" 
                class="w-full p-4 rounded-xl border-4 border-[#cbb155] text-2xl text-center font-bold bg-white focus:outline-none placeholder:text-gray-300">
            <button onclick="consultarEstatus()" class="w-full bg-[#052d62] text-[#cbb155] font-black py-5 rounded-xl text-lg shadow-lg hover:bg-black transition-all uppercase italic">
                Consultar Registro
            </button>
            <div id="resultado" class="hidden mt-6 p-6 rounded-2xl text-center font-bold border-2"></div>
        </div>
    </div>

    <script>
        async function consultarEstatus() {
            const celularUsuario = document.getElementById('celularInput').value.trim();
            const resultadoDiv = document.getElementById('resultado');
            // Tu URL de Google Sheets publicada como CSV
            const url = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSVSgHlway102guhsuSOkbVIZyBLybfeCAJpAEAUYf4gp3ir25Av8LHp41PSAIc81TuWHnSgIu7jXuv/pub?gid=666326084&single=true&output=csv';

            if (celularUsuario.length < 9) {
                alert("Por favor, ingresa los 9 dígitos de tu celular.");
                return;
            }

            resultadoDiv.innerHTML = "Buscando en la base de datos...";
            resultadoDiv.className = "mt-6 p-6 rounded-2xl text-center font-bold border-2 bg-gray-200 block text-[#052d62] animate-pulse";

            try {
                const response = await fetch(url);
                const data = await response.text();
                const filas = data.split('\n');
                let encontrado = false;

                // Buscamos de abajo hacia arriba para tener el registro más reciente
                for (let i = filas.length - 1; i >= 1; i--) {
                    const columnas = filas[i].split(/,(?=(?:(?:[^"]*"){2})*[^!]*$)/);
                    
                    const celularCSV = columnas[0] ? columnas[0].replace(/\D/g, '').trim() : "";
                    
                    if (celularCSV === celularUsuario) {
                        const nombre = columnas[3] ? columnas[3].replace(/['"]+/g, '').trim() : "HINCHA"; 
                        const codigoPG = columnas[20] ? columnas[20].replace(/['"]+/g, '').trim() : "---";
                        const fechaSorteo = columnas[8] ? columnas[8].replace(/['"]+/g, '').trim() : "Por definir";
                        const premio = columnas[14] ? columnas[14].replace(/['"]+/g, '').trim() : "No inscrito";
                        const vipStatus = columnas[25] ? columnas[25].replace(/['"]+/g, '').trim() : "NO";
                        
                        resultadoDiv.innerHTML = `
                            <div class="text-xl mb-4 border-b-2 border-[#cbb155] pb-2 uppercase font-black">${nombre}</div>
                            
                            <div class="mb-4">
                                <span class="text-[10px] block opacity-60 uppercase font-black">Tu Código PG:</span>
                                <span class="text-3xl font-black text-[#052d62] bg-yellow-400 px-3 rounded-lg">${codigoPG}</span>
                            </div>

                            <div class="mb-4 py-3 border-y border-gray-200">
                                <span class="text-[11px] block font-black text-[#cbb155] uppercase">Sorteo:</span>
                                <span class="text-lg block font-bold leading-tight">${premio}</span>
                                <span class="text-xs block opacity-70">${fechaSorteo}</span>
                            </div>

                            <div class="p-2 bg-white border border-[#cbb155] rounded-lg text-[10px] uppercase">
                                VIP: ${vipStatus}
                            </div>
                        `;
                        resultadoDiv.className = "mt-6 p-6 rounded-2xl text-center font-bold border-4 border-[#cbb155] bg-white text-[#052d62] block shadow-xl";
                        encontrado = true;
                        break;
                    }
                }

                if (!encontrado) {
                    resultadoDiv.innerHTML = "EL CELULAR NO ESTÁ REGISTRADO";
                    resultadoDiv.className = "mt-6 p-6 rounded-2xl text-center font-bold border-2 border-red-500 bg-red-100 text-red-700 block";
                }
            } catch (error) {
                resultadoDiv.innerHTML = "ERROR DE CONEXIÓN<br><span class='text-xs font-normal'>Intenta nuevamente en un momento.</span>";
                resultadoDiv.className = "mt-6 p-6 rounded-2xl text-center font-bold border-2 border-orange-500 bg-orange-100 text-orange-700 block";
            }
        }
    </script>
</body>
</html>
