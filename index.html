<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Corazón para Ganar</title>
</head>
<body class="bg-[#052d62] text-white font-sans min-h-screen flex items-center justify-center p-4">
    <div class="max-w-md w-full bg-[#f1f1f1] rounded-3xl p-8 shadow-2xl text-[#052d62]">
        <header class="text-center mb-8">
            <h1 class="text-3xl font-black uppercase italic tracking-tighter leading-none text-[#052d62]">CORAZÓN PARA GANAR</h1>
            <p class="text-[10px] font-bold opacity-70 italic text-[#cbb155] tracking-widest uppercase mt-1">estatus oficial grone</p>
        </header>

        <div class="space-y-4">
            <div>
                <input type="tel" id="celularInput" maxlength="9" placeholder="999888777" 
                    class="w-full p-4 rounded-xl border-4 border-[#cbb155] text-2xl text-center font-bold bg-white focus:outline-none placeholder:text-gray-300">
                <p class="text-[10px] text-center mt-2 font-bold text-[#052d62] opacity-80 italic">
                    Escribe el número de teléfono con el que te registraste para el sorteo.
                </p>
            </div>

            <button onclick="consultarEstatus()" class="w-full bg-[#052d62] text-[#cbb155] font-black py-5 rounded-xl text-lg shadow-lg hover:bg-black transition-all uppercase italic text-center">
                CONSULTAR REGISTRO
            </button>
            
            <div id="resultado" class="hidden mt-6 p-6 rounded-2xl text-center font-bold border-2">
                </div>
        </div>
    </div>

    <script>
        async function consultarEstatus() {
            const celularUsuario = document.getElementById('celularInput').value.trim();
            const resultadoDiv = document.getElementById('resultado');
            const url = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSVSgHlway102guhsuSOkbVIZyBLybfeCAJpAEAUYf4gp3ir25Av8LHp41PSAIc81TuWHnSgIu7jXuv/pub?gid=666326084&single=true&output=csv';

            if (celularUsuario.length < 9) {
                alert("Por favor, ingresa los 9 dígitos de tu celular.");
                return;
            }

            resultadoDiv.innerHTML = "Buscando...";
            resultadoDiv.className = "mt-6 p-6 rounded-2xl text-center font-bold border-2 bg-gray-100 block text-[#052d62] animate-pulse";

            try {
                const response = await fetch(url);
                const data = await response.text();
                const filas = data.split('\n');
                let encontrado = false;

                for (let i = filas.length - 1; i >= 1; i--) {
                    const columnas = filas[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    const celularCSV = columnas[0] ? columnas[0].replace(/\D/g, '').trim() : "";
                    const estatusM = columnas[12] ? columnas[12].trim() : ""; 

                    if (celularCSV === celularUsuario && estatusM !== "registro no válido") {
                        const nombre = columnas[3] ? columnas[3].replace(/['"]+/g, '').trim() : "HINCHA"; 
                        const codigoV = columnas[21] ? columnas[21].replace(/['"]+/g, '').trim() : "---"; 
                        const fechaJ = columnas[9] ? columnas[9].replace(/['"]+/g, '').trim() : "---"; // Col J
                        const productoP = columnas[15] ? columnas[15].replace(/['"]+/g, '').trim() : "---"; 
                        const vipAA = columnas[26] ? columnas[26].replace(/['"]+/g, '').trim() : "AL VIP, no estas participando"; 

                        resultadoDiv.innerHTML = `
                            <div class="text-2xl mb-5 border-b-2 border-gray-200 pb-2 uppercase font-black tracking-tight">${nombre}</div>
                            
                            <div class="mb-5">
                                <span class="text-[10px] block opacity-60 uppercase font-bold mb-1 italic">Tu código PG es:</span>
                                <span class="text-3xl font-black text-[#052d62] bg-[#cbb155] px-4 py-1 rounded-lg shadow-sm italic uppercase tracking-widest">
                                    ${codigoV === "repetido +1 vez" ? "---" : codigoV}
                                </span>
                            </div>

                            <div class="mb-5 py-4 border-t border-gray-200 text-[#052d62]">
                                <span class="text-[11px] block font-black text-[#cbb155] uppercase mb-1 tracking-wider italic">SORTEO GRATUITO 🎁</span>
                                <span class="text-xl block font-bold leading-tight uppercase italic mb-2">${productoP}</span>
                                <div class="bg-gray-100 py-1 px-3 rounded-md inline-block">
                                    <span class="text-[10px] opacity-70 uppercase font-bold">Fecha:</span>
                                    <span class="text-xs font-black uppercase"> ${fechaJ}</span>
                                </div>
                            </div>

                            <div class="mb-0 py-4 border-t border-gray-200">
                                <span class="text-[11px] block font-black text-[#cbb155] uppercase mb-1 tracking-wider italic">VIP 🏆</span>
                                <span class="text-xl block font-black italic tracking-tight ${vipAA === 'Accedes 😎' ? 'text-blue-700' : 'text-gray-400'}">
                                    ${vipAA}
                                </span>
                            </div>
                        `;
                        resultadoDiv.className = "mt-6 p-6 rounded-2xl text-center font-bold border-4 border-[#cbb155] bg-white text-[#052d62] block shadow-xl";
                        encontrado = true;
                        break;
                    }
                }

                if (!encontrado) {
                    resultadoDiv.innerHTML = "No estas registrado";
                    resultadoDiv.className = "mt-6 p-6 rounded-2xl text-center font-bold border-2 border-red-500 bg-red-100 text-red-700 block";
                }
            } catch (error) {
                resultadoDiv.innerHTML = "ERROR DE CONEXIÓN";
                resultadoDiv.className = "mt-6 p-6 rounded-2xl text-center font-bold border-2 border-orange-500 bg-orange-100 text-orange-700 block";
            }
        }
    </script>
</body>
</html>
